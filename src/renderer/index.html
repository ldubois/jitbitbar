<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JitBitBar</title>
  <style>
    :root {
      --bg-base: #0a0a0b;
      --bg-card: rgba(28, 28, 32, 0.6);
      --bg-card-hover: rgba(38, 38, 45, 0.7);
      --bg-input: rgba(20, 20, 24, 0.8);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --accent-purple: #4945FF;
      --accent-purple-glow: rgba(73, 69, 255, 0.4);
      --accent-blue: #3B82F6;
      --accent-green: #10B981;
      --accent-orange: #F59E0B;
      --accent-orange-glow: rgba(245, 158, 11, 0.3);
      --accent-red: #EF4444;
      --accent-red-glow: rgba(239, 68, 68, 0.3);
      --gradient-purple: linear-gradient(135deg, #4945FF 0%, #6366F1 100%);
      --gradient-mesh: radial-gradient(at 0% 0%, rgba(73, 69, 255, 0.15) 0px, transparent 50%),
                       radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-base: #f5f5f7; --bg-card: rgba(255, 255, 255, 0.8);
        --bg-card-hover: rgba(250, 250, 255, 0.9); --bg-input: rgba(245, 245, 250, 0.9);
        --glass-border: rgba(0, 0, 0, 0.08); --text-primary: rgba(0, 0, 0, 0.9);
        --text-secondary: rgba(0, 0, 0, 0.55); --text-tertiary: rgba(0, 0, 0, 0.35);
        --gradient-mesh: radial-gradient(at 0% 0%, rgba(73, 69, 255, 0.08) 0px, transparent 50%),
                         radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 13px; background: var(--bg-base); background-image: var(--gradient-mesh);
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
      overflow: hidden; user-select: none; display: flex; flex-direction: column; height: 100vh;
    }

    .header {
      padding: 16px 20px 12px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--gradient-purple);
      display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--accent-purple-glow);
    }
    .header-icon svg { width: 16px; height: 16px; fill: white; }
    .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--bg-card);
      border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease; color: var(--text-secondary);
    }
    .header-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .header-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .header-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .header-badge.red { background: var(--accent-red); color: white; }
    .header-badge.orange { background: var(--accent-orange); color: white; }
    .header-badge.blue { background: var(--accent-blue); color: white; }

    .content { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

    /* TICKET CARD */
    .ticket-item {
      padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--glass-border);
      border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
    }
    .ticket-item:hover { background: var(--bg-card-hover); border-color: rgba(73, 69, 255, 0.2); }
    .ticket-item.expanded { border-color: var(--accent-purple); cursor: default; }

    .ticket-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .severity-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red-glow); }
    .severity-dot.warning { background: var(--accent-orange); box-shadow: 0 0 8px var(--accent-orange-glow); }
    .severity-dot.info { background: var(--accent-blue); }
    .ticket-subject { font-weight: 600; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-id { font-size: 11px; color: var(--text-tertiary); font-family: 'SF Mono', Monaco, monospace; }

    .ticket-preview { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-item.expanded .ticket-preview { white-space: normal; word-break: break-word; }

    .ticket-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-tertiary); }
    .ticket-requester { display: flex; align-items: center; gap: 4px; }
    .ticket-requester svg { width: 12px; height: 12px; fill: currentColor; }

    /* DETAIL PANEL */
    .ticket-detail {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--glass-border);
    }
    .ticket-item.expanded .ticket-detail { display: block; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .detail-cell {
      padding: 10px 12px; background: var(--bg-input); border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
    }
    .detail-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-value { font-size: 13px; font-weight: 500; word-break: break-word; }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge-error { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
    .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
    .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    /* REPLY */
    .reply-box {
      width: 100%; min-height: 64px; resize: vertical; padding: 10px 12px; margin-bottom: 10px;
      background: var(--bg-input); border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none; transition: all 0.2s ease;
    }
    .reply-box:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 3px var(--accent-purple-glow); }
    .reply-box::placeholder { color: var(--text-tertiary); }

    .detail-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-btn {
      flex: 1; min-width: 90px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; border: none; text-align: center;
    }
    .detail-btn-primary {
      background: var(--gradient-purple); color: white; box-shadow: 0 2px 8px var(--accent-purple-glow);
    }
    .detail-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-purple-glow); }
    .detail-btn-secondary {
      background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--glass-border);
    }
    .detail-btn-secondary:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .detail-btn-success {
      background: var(--accent-green); color: white; box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }
    .detail-btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
    .detail-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-tertiary); }
    .empty-state-icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.5; }
    .empty-state-icon svg { width: 100%; height: 100%; fill: currentColor; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .empty-state-text { font-size: 12px; line-height: 1.5; }
    .empty-state-link { color: var(--accent-purple); cursor: pointer; }

    /* FOOTER */
    .footer {
      padding: 8px 20px; border-top: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--text-tertiary); flex-shrink: 0;
    }
    .footer-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); }
    .status-dot.error { background: var(--accent-red); }
    .status-dot.warning { background: var(--accent-orange); }
    .status-dot.inactive { background: var(--text-tertiary); }
    .restore-link { color: var(--accent-purple); cursor: pointer; }
    .restore-link:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V9h2v2zm0-4h-2V5h2v2z"/></svg>
      </div>
      <span class="header-title">JitBitBar</span>
      <span class="header-badge" id="ticketBadge" style="display:none">0</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="refreshBtn" title="Rafraîchir">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="header-btn" id="prefsBtn" title="Réglages">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="ticketsList">
    <div class="empty-state">
      <div class="empty-state-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div class="empty-state-title">Chargement…</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-status">
      <div class="status-dot inactive" id="statusDot"></div>
      <span id="lastUpdated">Jamais rafraîchi</span>
    </div>
    <span class="restore-link" id="restoreBtn" style="display:none">Afficher masqués</span>
  </div>

  <script>
    const bridge = window.jitbitbar;

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      if (!bridge) return;
      document.getElementById('lastUpdated').textContent = 'Mise à jour…';
      await bridge.jitbit.refresh();
    });
    document.getElementById('prefsBtn').addEventListener('click', () => {
      if (bridge) bridge.app.showPreferences();
    });
    document.getElementById('restoreBtn').addEventListener('click', async () => {
      if (bridge) await bridge.jitbit.restore();
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text == null ? '' : String(text);
      return div.innerHTML;
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
      if (seconds < 0) return '';
      if (seconds < 60) return "à l'instant";
      if (seconds < 3600) return 'il y a ' + Math.floor(seconds / 60) + ' min';
      if (seconds < 86400) return 'il y a ' + Math.floor(seconds / 3600) + ' h';
      return 'il y a ' + Math.floor(seconds / 86400) + ' j';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return '-';
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    // Mirror of severityOf() in polling.ts — drives the coloured dot.
    function severityOf(t) {
      const status = (t.status || '').toLowerCase();
      if (t.statusId === 1 || status.includes('new') || status.includes('nouveau')) return 'error';
      if (status.includes('progress') || status.includes('cours') || status.includes('hold') || status.includes('attente')) return 'warning';
      if ((t.priority || 0) >= 2) return 'error';
      if ((t.priority || 0) === 1) return 'warning';
      return 'info';
    }

    function configureEmptyState() {
      return `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></div>
          <div class="empty-state-title">Configurer Jitbit</div>
          <div class="empty-state-text">Renseigne l'URL et le token dans les <span class="empty-state-link" id="goPrefs">réglages</span>.</div>
        </div>`;
    }

    function allClearState() {
      return `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
          <div class="empty-state-title">All clear !</div>
          <div class="empty-state-text">Aucune demande à traiter pour le moment.</div>
        </div>`;
    }

    let isConfigured = false;

    function renderTickets(tickets) {
      const container = document.getElementById('ticketsList');
      const badge = document.getElementById('ticketBadge');
      const restoreBtn = document.getElementById('restoreBtn');

      if (!isConfigured) {
        container.innerHTML = configureEmptyState();
        const go = document.getElementById('goPrefs');
        if (go) go.addEventListener('click', () => bridge && bridge.app.showPreferences());
        badge.style.display = 'none';
        restoreBtn.style.display = 'none';
        return;
      }

      if (!tickets || tickets.length === 0) {
        container.innerHTML = allClearState();
        badge.style.display = 'none';
        restoreBtn.style.display = 'inline';
        return;
      }

      const urgent = tickets.filter(t => severityOf(t) === 'error').length;
      const warn = tickets.filter(t => severityOf(t) === 'warning').length;
      if (urgent > 0) { badge.textContent = urgent; badge.className = 'header-badge red'; }
      else if (warn > 0) { badge.textContent = warn; badge.className = 'header-badge orange'; }
      else { badge.textContent = tickets.length; badge.className = 'header-badge blue'; }
      badge.style.display = 'inline';

      container.innerHTML = tickets.map(t => {
        const sev = severityOf(t);
        return `
        <div class="ticket-item" data-id="${t.id}">
          <div class="ticket-header">
            <div class="severity-dot ${sev}"></div>
            <div class="ticket-subject">${escapeHtml(t.subject)}</div>
            <div class="ticket-id">#${t.id}</div>
          </div>
          <div class="ticket-preview">${escapeHtml(t.preview || t.categoryName || t.status || '')}</div>
          <div class="ticket-meta">
            <div class="ticket-requester">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              ${escapeHtml(t.userName || 'Inconnu')}
            </div>
            <span>${timeAgo(t.updatedAt)}</span>
          </div>

          <div class="ticket-detail">
            <div class="detail-tags">
              <span class="badge badge-${sev}">${escapeHtml(t.status || '—')}</span>
              ${t.categoryName ? '<span class="badge badge-info">' + escapeHtml(t.categoryName) + '</span>' : ''}
            </div>
            <div class="detail-grid">
              <div class="detail-cell">
                <div class="detail-label">Demandeur</div>
                <div class="detail-value">${escapeHtml(t.userName || '-')}</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">Assigné à</div>
                <div class="detail-value">${escapeHtml(t.assignedToUser || '-')}</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">Ouvert le</div>
                <div class="detail-value">${formatDate(t.createdAt)}</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">Mis à jour</div>
                <div class="detail-value">${formatDate(t.updatedAt)}</div>
              </div>
            </div>

            <textarea class="reply-box" data-reply="${t.id}" placeholder="Répondre au demandeur… (utilisé aussi par « Clôturer »)"></textarea>

            <div class="detail-actions">
              <button class="detail-btn detail-btn-secondary" data-open="${escapeHtml(t.url)}">Ouvrir</button>
              <button class="detail-btn detail-btn-primary" data-reply-id="${t.id}">Répondre</button>
              <button class="detail-btn detail-btn-primary" data-asana-id="${t.id}">→ Asana</button>
              <button class="detail-btn detail-btn-success" data-close-id="${t.id}">Clôturer</button>
            </div>
          </div>
        </div>`;
      }).join('');

      wireTicketEvents(container, tickets);
      restoreBtn.style.display = 'inline';
    }

    function wireTicketEvents(container, tickets) {
      const byId = (id) => tickets.find(t => String(t.id) === String(id));

      container.querySelectorAll('.ticket-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.detail-btn') || e.target.closest('.reply-box')) return;
          item.classList.toggle('expanded');
        });
      });

      container.querySelectorAll('[data-open]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (btn.dataset.open && bridge) bridge.app.openExternal(btn.dataset.open);
        });
      });

      container.querySelectorAll('[data-reply-id]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.replyId;
          const box = container.querySelector(`.reply-box[data-reply="${id}"]`);
          const body = (box && box.value.trim()) || '';
          if (!body) { box && box.focus(); return; }
          btn.disabled = true; btn.textContent = 'Envoi…';
          const res = await bridge.jitbit.reply(Number(id), body);
          if (res.success) { btn.textContent = 'Envoyé ✓'; if (box) box.value = ''; }
          else { btn.disabled = false; btn.textContent = 'Réessayer'; }
        });
      });

      container.querySelectorAll('[data-asana-id]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const t = byId(btn.dataset.asanaId);
          if (!t) return;
          btn.disabled = true; btn.textContent = 'Création…';
          const res = await bridge.asana.createTask(t);
          if (res.success) {
            btn.textContent = 'Créée ✓';
            if (res.url) bridge.app.openExternal(res.url);
          } else {
            btn.disabled = false; btn.textContent = '→ Asana';
          }
        });
      });

      container.querySelectorAll('[data-close-id]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.closeId;
          const box = container.querySelector(`.reply-box[data-reply="${id}"]`);
          const reply = (box && box.value.trim()) || '';
          btn.disabled = true; btn.textContent = 'Clôture…';
          const res = await bridge.jitbit.close(Number(id), reply);
          if (!res.success) { btn.disabled = false; btn.textContent = 'Clôturer'; }
        });
      });
    }

    function updateStatus(data) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('lastUpdated');
      dot.className = 'status-dot';
      if (data.status === 'red') dot.classList.add('error');
      else if (data.status === 'orange') dot.classList.add('warning');
      else if (data.status === 'gray') dot.classList.add('inactive');
      text.textContent = 'Updated ' + new Date(data.lastUpdated).toLocaleTimeString('fr-FR');
    }

    async function init() {
      if (!bridge) return;
      try {
        const cfg = await bridge.config.getAll();
        isConfigured = !!(cfg && cfg.jitbitUrl && cfg.hasJitbitToken);
      } catch (e) { isConfigured = false; }

      bridge.on.dataUpdated((data) => {
        renderTickets(data.tickets);
        updateStatus(data);
      });
      await bridge.jitbit.refresh();
    }

    init();
  </script>
</body>
</html>
